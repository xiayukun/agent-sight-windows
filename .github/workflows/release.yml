name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0-preview"
        required: true
        type: string

permissions:
  contents: write

env:
  EXPECTED_RELEASE_REPOSITORY: xiayukun/agent-sight-windows

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Resolve release tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          if (-not $tag.StartsWith("v")) {
            throw "Release tag must start with v, got: $tag"
          }
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_VERSION=$($tag.TrimStart('v'))" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify GitHub release target
        shell: pwsh
        run: |
          if ($env:GITHUB_REPOSITORY -ne $env:EXPECTED_RELEASE_REPOSITORY) {
            throw "unexpected GitHub release repository: $env:GITHUB_REPOSITORY (expected $env:EXPECTED_RELEASE_REPOSITORY)"
          }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and packaging dependencies
        shell: pwsh
        run: |
          py -m pip install --upgrade pip
          py -m pip install -e ".[packaging-exe]"

      - name: Run tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          py -m unittest discover tests

      - name: Build dist executables
        shell: pwsh
        run: |
          py tools/build_host_agent_exe.py | Tee-Object -FilePath build-report.json
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          if (-not (Test-Path -LiteralPath ".\dist\AgentSightSetup.exe")) {
            throw "Expected dist\AgentSightSetup.exe was not produced."
          }
          if (-not (Test-Path -LiteralPath ".\dist\AgentSightSupervisor.exe")) {
            throw "Expected dist\AgentSightSupervisor.exe was not produced."
          }

      - name: Prepare release assets and SHA256 checksums
        shell: pwsh
        run: |
          $releaseAssetsDir = ".\release_assets"
          New-Item -ItemType Directory -Force -Path $releaseAssetsDir | Out-Null
          $setupAssetName = "AgentSightSetup-$env:RELEASE_VERSION-windows-x64.exe"
          $setupAssetPath = Join-Path $releaseAssetsDir $setupAssetName
          Copy-Item -LiteralPath ".\dist\AgentSightSetup.exe" -Destination $setupAssetPath -Force
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $setupAssetPath).Hash.ToLower()
          "$hash  $setupAssetName" | Set-Content -LiteralPath (Join-Path $releaseAssetsDir "AgentSightSetup-$env:RELEASE_VERSION-windows-x64.sha256.txt") -Encoding utf8
          "$hash  $setupAssetName" | Set-Content -LiteralPath (Join-Path $releaseAssetsDir "SHA256SUMS.txt") -Encoding utf8

      - name: Resolve release notes
        shell: pwsh
        run: |
          $zh = "docs/release-notes-$env:RELEASE_TAG.md"
          $en = "docs/release-notes-$env:RELEASE_TAG.en.md"
          if (-not (Test-Path -LiteralPath $zh)) {
            $zh = "docs/release-notes-template.md"
          }
          if (-not (Test-Path -LiteralPath $en)) {
            $en = "docs/release-notes-template.en.md"
          }
          Get-Content -LiteralPath $zh | Set-Content -LiteralPath release-notes-combined.md -Encoding utf8
          "" | Add-Content -LiteralPath release-notes-combined.md -Encoding utf8
          "---" | Add-Content -LiteralPath release-notes-combined.md -Encoding utf8
          "" | Add-Content -LiteralPath release-notes-combined.md -Encoding utf8
          Get-Content -LiteralPath $en | Add-Content -LiteralPath release-notes-combined.md -Encoding utf8
          "RELEASE_NOTES=release-notes-combined.md" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgentSight-Windows-CI-build-${{ env.RELEASE_TAG }}
          path: |
            dist\*.exe
            dist\*.cmd
            release_assets\*
            build-report.json
          if-no-files-found: error

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $title = "AgentSight for Windows $env:RELEASE_TAG"
          $releaseAssets = @(Get-ChildItem -LiteralPath ".\release_assets" -File | Sort-Object Name)
          if ($releaseAssets.Count -ne 3) {
            throw "Expected exactly 3 release assets: versioned setup exe, setup sha256 txt, and SHA256SUMS.txt. Found $($releaseAssets.Count)."
          }
          $assetNames = @($releaseAssets | ForEach-Object { $_.Name })
          foreach ($requiredAsset in @(
            "AgentSightSetup-$env:RELEASE_VERSION-windows-x64.exe",
            "AgentSightSetup-$env:RELEASE_VERSION-windows-x64.sha256.txt",
            "SHA256SUMS.txt"
          )) {
            if ($assetNames -notcontains $requiredAsset) {
              throw "Missing release asset: $requiredAsset"
            }
          }
          foreach ($forbiddenAsset in @(
            "AgentSightSupervisor.exe",
            "AgentSightHostAgent.exe",
            "AgentSightTray.exe",
            "AgentSightMcpServer.exe",
            "AgentSightHostAgentInstaller.exe",
            "AgentSightHostAgentScenarios.exe",
            "INSTALL_AGENTSIGHT.cmd",
            "UNINSTALL_AGENTSIGHT.cmd"
          )) {
            if ($assetNames -contains $forbiddenAsset) {
              throw "Internal executable or command must not be a GitHub Release front-page asset: $forbiddenAsset"
            }
          }
          $assetPaths = @($releaseAssets | ForEach-Object { $_.FullName })
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY --notes-file $env:RELEASE_NOTES --title $title
            gh release upload $env:RELEASE_TAG $assetPaths --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $env:RELEASE_TAG $assetPaths --repo $env:GITHUB_REPOSITORY --title $title --notes-file $env:RELEASE_NOTES
          }
