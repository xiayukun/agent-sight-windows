name: tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[capture-pillow]"

      - name: Run unit tests
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -m unittest discover tests

      - name: Run release readiness preflight
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -m agentsight.diagnostics.release_readiness --output runs_ci_release_readiness_report.json
